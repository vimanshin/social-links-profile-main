<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor | Social links profile</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main>
      <article class="card">
        <img
          class="card__avatar"
          src="./assets/images/avatar-jessica.jpeg"
          alt="Jessica Randall"
        />
        <h1 class="card__title">Jessica Randall</h1>
        <p class="card__location">London, United Kingdom</p>
        <p class="card__description">"Front-end developer and avid reader."</p>
        <ul class="card__list">
          <li class="card__item">
            <a
              class="card__link"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Открыть GitHub в новой вкладке"
              >GitHub</a
            >
          </li>
          <li class="card__item">
            <a
              class="card__link"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Открыть Frontend Mentor в новой вкладке"
              >Frontend Mentor</a
            >
          </li>
          <li class="card__item">
            <a
              class="card__link"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Открыть LinkedIn в новой вкладке"
              >LinkedIn</a
            >
          </li>
          <li class="card__item">
            <a
              class="card__link"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Открыть Twitter в новой вкладке"
              >Twitter</a
            >
          </li>
          <li class="card__item">
            <a
              class="card__link"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Открыть Instagram в новой вкладке"
              >Instagram</a
            >
          </li>
        </ul>
      </article>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">42</a>.
    </footer>
  </body>
</html>
